name: Export OSM fietsparkeren gemeente Deventer

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin npm jq
          npm install -g osmtogeojson

      - name: Overpass – ophalen (gemeente Deventer)
        env:
          UA: "osmfiets export (github.com/${{ github.repository }})"
          MIRRORS: >-
            https://overpass-api.de/api/interpreter
            https://overpass.kumi.systems/api/interpreter
        run: |
          mkdir -p data

          # Haal de Overpass-query op; probeer meerdere mirrors en
          # accepteer alleen een geldige JSON-respons. De publieke
          # instances geven bij drukte regelmatig 504/HTML terug.
          fetch_overpass () {
            query_file="$1"
            out_file="$2"
            for url in $MIRRORS; do
              echo "→ $query_file via $url"
              http=$(curl -sS -w "%{http_code}" \
                -A "$UA" \
                --retry 3 --retry-delay 10 --retry-all-errors \
                --max-time 180 \
                --data-urlencode "data@${query_file}" \
                "$url" \
                -o "$out_file" || true)
              echo "  HTTP $http"
              if [ "$http" = "200" ] && jq -e . "$out_file" >/dev/null 2>&1; then
                echo "  OK"
                return 0
              fi
              echo "  mislukt, volgende mirror…"
            done
            echo "Alle Overpass-mirrors faalden voor $query_file"
            head -c 500 "$out_file"
            return 1
          }

          fetch_overpass query.overpassql data/bicycle_parking.osm.json

      - name: GeoJSON + capacity normaliseren
        run: |
          # OSM -> GeoJSON, daarna capacity casten naar een getal en
          # lege properties wegwerken.
          osmtogeojson data/bicycle_parking.osm.json \
          | jq '
              (.features[]?.properties.capacity |=
                if . == null or . == "" then null
                elif (type == "number") then .
                elif (type == "string") then (try (tonumber | floor) catch null)
                else null
                end
              )
              | (.features[]?.properties |= with_entries(select(.value != null)))
            ' \
          > data/bicycle_parking_all_points.geojson

          echo "Features: $(jq '.features | length' data/bicycle_parking_all_points.geojson)"

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bicycle_parking_all_points.geojson
          git commit -m "Update OSM fietsparkeren exports" || echo "No changes"
          git push
