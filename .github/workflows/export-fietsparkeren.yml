name: Export OSM fietsparkeren Deventer (punten + polygon-centroids)

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin npm jq
          npm install -g osmtogeojson

      - name: Overpass – punten
        run: |
          mkdir -p data
          curl -sS -w "\nHTTP status: %{http_code}\n" \
            -X POST --data-binary @querypoints.overpassql \
            https://overpass-api.de/api/interpreter \
            -o data/bicycle_parking_points.osm.json
          osmtogeojson data/bicycle_parking_points.osm.json \
            > data/bicycle_parking_points.geojson

      - name: Overpass – polygonen als punten
        run: |
          mkdir -p data

          HTTP_CODE=$(curl -sS -w "%{http_code}" \
            -X POST --data-binary @querypolygons.overpassql \
            https://overpass-api.de/api/interpreter \
            -o data/bicycle_parking_polygon_centroids.osm.json)

          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Overpass request failed"
            cat data/bicycle_parking_polygon_centroids.osm.json
            exit 1
          fi

          osmtogeojson data/bicycle_parking_polygon_centroids.osm.json \
            > data/bicycle_parking_polygon_centroids.geo


      - name: Merge to 1 points layer (cast capacity to number)
        run: |
          jq -s '
          {
            type: "FeatureCollection",
            features: (.[0].features + .[1].features)
          }
          | (.features[]?.properties.capacity |=
              if . == null or . == "" then null
              elif (type == "number") then .
              elif (type == "string") then (try (tonumber | floor) catch null)
              else null
              end
            )
          | (.features[]?.properties |= with_entries(select(.value != null)))
          ' \
          data/bicycle_parking_points.geojson \
          data/bicycle_parking_polygon_centroids.geojson \
          > data/bicycle_parking_all_points.geojson

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bicycle_parking_points.geojson data/bicycle_parking_polygon_centroids.geojson data/bicycle_parking_all_points.geojson
          git commit -m "Update OSM fietsparkeren exports" || echo "No changes"
          git push
