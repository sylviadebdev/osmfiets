name: Export OSM fietsparkeren gemeente Deventer

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin npm jq
          npm install -g osmtogeojson

      - name: Overpass – ophalen (gemeente Deventer)
        env:
          UA: "osmfiets export (github.com/${{ github.repository }})"
          MIRRORS: >-
            https://overpass-api.de/api/interpreter
            https://overpass.kumi.systems/api/interpreter
        run: |
          mkdir -p data

          # Haal de Overpass-query op; probeer meerdere mirrors en
          # accepteer alleen een geldige JSON-respons. De publieke
          # instances geven bij drukte regelmatig 504/HTML terug.
          fetch_overpass () {
            query_file="$1"
            out_file="$2"
            for url in $MIRRORS; do
              echo "→ $query_file via $url"
              http=$(curl -sS -w "%{http_code}" \
                -A "$UA" \
                --retry 3 --retry-delay 10 --retry-all-errors \
                --max-time 180 \
                --data-urlencode "data@${query_file}" \
                "$url" \
                -o "$out_file" || true)
              echo "  HTTP $http"
              if [ "$http" = "200" ] && jq -e . "$out_file" >/dev/null 2>&1; then
                echo "  OK"
                return 0
              fi
              echo "  mislukt, volgende mirror…"
            done
            echo "Alle Overpass-mirrors faalden voor $query_file"
            head -c 500 "$out_file"
            return 1
          }

          fetch_overpass query.overpassql data/bicycle_parking.osm.json

      - name: GeoJSON + capacity normaliseren
        run: |
          OLD=data/bicycle_parking_all_points.geojson
          NEW="${OLD}.new"

          # OSM -> GeoJSON, capacity casten naar een getal, lege properties
          # wegwerken en freshness-metadata als top-level velden toevoegen
          # (foreign members, RFC 7946 §6.1 — mapping-libs negeren ze).
          osmtogeojson data/bicycle_parking.osm.json \
          | jq '
              (now | todate) as $ts
              | (.features[]?.properties.capacity |=
                if . == null or . == "" then null
                elif (type == "number") then .
                elif (type == "string") then (try (tonumber | floor) catch null)
                else null
                end
              )
              | (.features[]?.properties |= with_entries(select(.value != null)))
              | (.features[]?.properties.osm_fetched_at = $ts)
              | . + {
                  generated_at: $ts,
                  source: "OpenStreetMap via Overpass API (gemeente Deventer)",
                  feature_count: (.features | length)
                }
            ' \
          > "$NEW"

          # Guard: overschrijf goede data nooit met (bijna) niets.
          new_count=$(jq '.features | length' "$NEW")
          old_count=0
          [ -f "$OLD" ] && old_count=$(jq '.features | length' "$OLD")
          echo "Features: nieuw=$new_count, huidig=$old_count"

          if [ "$new_count" -eq 0 ]; then
            echo "::error::0 features — vermoedelijk lege/foute Overpass-respons. Afgebroken."
            exit 1
          fi
          if [ "$old_count" -gt 0 ] && [ "$new_count" -lt $((old_count / 2)) ]; then
            echo "::error::nieuw ($new_count) < 50% van huidig ($old_count). Verdachte daling, afgebroken."
            exit 1
          fi

          mv "$NEW" "$OLD"

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bicycle_parking_all_points.geojson
          git commit -m "Update OSM fietsparkeren exports" || echo "No changes"
          git push
